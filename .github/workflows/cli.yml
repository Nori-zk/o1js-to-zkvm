name: CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: cli compile
        run: npm run cli -- compile -o circuit.json

      - name: cli prove
        run: |
          echo '{"publicInput": "8", "privateInput": "2"}' > inputs.json
          npm run cli -- prove -i inputs.json -o proof.json

      - name: cli verify
        run: npm run cli -- verify -c circuit.json -p proof.json
